<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="tab1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="tab2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e1b4b" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Tab 3 (back) -->
  <g filter="url(#shadow)">
    <rect x="30" y="38" width="72" height="56" rx="6" fill="url(#tab2)" opacity="0.5"/>
    <rect x="30" y="32" width="28" height="10" rx="4" fill="url(#tab2)" opacity="0.5"/>
  </g>

  <!-- Tab 2 (middle) -->
  <g filter="url(#shadow)">
    <rect x="24" y="46" width="72" height="56" rx="6" fill="url(#tab2)"/>
    <rect x="24" y="40" width="28" height="10" rx="4" fill="url(#tab2)"/>
    <!-- Tab 2 lines -->
    <rect x="32" y="56" width="40" height="3" rx="1.5" fill="#6366f1" opacity="0.2"/>
    <rect x="32" y="63" width="28" height="3" rx="1.5" fill="#6366f1" opacity="0.15"/>
  </g>

  <!-- Tab 1 (front) -->
  <g filter="url(#shadow)">
    <rect x="18" y="54" width="72" height="56" rx="6" fill="url(#tab1)"/>
    <rect x="18" y="48" width="28" height="10" rx="4" fill="url(#tab1)"/>
    <!-- Tab 1 lines -->
    <rect x="26" y="64" width="44" height="3.5" rx="1.75" fill="#6366f1" opacity="0.35"/>
    <rect x="26" y="72" width="32" height="3.5" rx="1.75" fill="#6366f1" opacity="0.25"/>
    <rect x="26" y="80" width="38" height="3.5" rx="1.75" fill="#6366f1" opacity="0.2"/>
    <!-- Color dots (group indicators) -->
    <circle cx="78" cy="66" r="3.5" fill="#22c55e" opacity="0.8"/>
    <circle cx="78" cy="74" r="3.5" fill="#3b82f6" opacity="0.8"/>
    <circle cx="78" cy="82" r="3.5" fill="#f59e0b" opacity="0.8"/>
  </g>

  <!-- AI Sparkle -->
  <g transform="translate(88, 22)">
    <!-- 4-point star -->
    <path d="M12,0 L14.5,9 L24,12 L14.5,15 L12,24 L9.5,15 L0,12 L9.5,9 Z" fill="url(#sparkle)"/>
    <!-- Small sparkle -->
    <path d="M22,0 L23,3.5 L26,4.5 L23,5.5 L22,9 L21,5.5 L18,4.5 L21,3.5 Z" fill="#fbbf24" opacity="0.7"/>
  </g>
</svg>
